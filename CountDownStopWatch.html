<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">スタンドアロンタイマー</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 残り時間わずか（10秒以下）のときの点滅エフェクト */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .pulse-warning {
            animation: pulse-slow 1s infinite;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl border border-slate-700 p-8 text-center relative overflow-hidden">
        
        <!-- 1. CSV設定（インポート）エリア -->
        <div class="mb-4">
            <label class="block mb-1.5 text-xs font-semibold text-slate-400 uppercase tracking-wider text-left">CSV設定（Googleドライブ等）</label>
            <div class="flex flex-col gap-2">
                <input 
                    type="text" 
                    id="csv-url-input" 
                    placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv" 
                    class="w-full px-3 py-2 text-xs rounded-xl bg-slate-900 border border-slate-750 text-slate-200 focus:outline-none focus:border-teal-500 transition-colors"
                />
                <button 
                    id="btn-load-url" 
                    class="w-full py-2 rounded-xl text-xs font-bold bg-slate-700 hover:bg-slate-600 text-teal-400 active:scale-98 transition-all border border-teal-500/10"
                >
                    Webから設定を読み込む
                </button>
            </div>
            <div class="mt-2 text-center">
                <label for="csv-file-input" class="text-[10px] text-slate-500 hover:text-teal-400 cursor-pointer transition-colors">
                    または ローカルCSVファイルをアップロード
                </label>
                <input type="file" id="csv-file-input" accept=".csv" class="hidden" />
            </div>
        </div>

        <!-- 2. スプレッドシート自動転記用のGAS設定（デバッグガイド付き） -->
        <div class="mb-6 pb-4 border-b border-slate-700/50">
            <div class="flex justify-between items-center mb-1.5">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider text-left">スプレッドシート書き出し設定</label>
                <span id="connection-status" class="text-[10px] text-slate-500">未設定</span>
            </div>
            <input 
                type="text" 
                id="gas-url-input" 
                placeholder="https://script.google.com/macros/s/.../exec" 
                class="w-full px-3 py-2 text-xs rounded-xl bg-slate-900 border border-slate-750 text-slate-200 focus:outline-none focus:border-teal-500 transition-colors"
            />
            <p class="text-[10px] text-slate-500 text-left mt-1 leading-relaxed">
                ※GASの「新しいデプロイ」で取得した「ウェブアプリのURL（末尾が/execのもの）」を入力してください。
            </p>
        </div>

        <!-- 3. タイマータイトル表示 -->
        <header class="mb-6">
            <h1 id="timer-title" class="text-3xl font-extrabold tracking-wider bg-gradient-to-r from-teal-400 to-indigo-400 bg-clip-text text-transparent">
                スタンドアロンタイマー
            </h1>
            <p id="timer-subtitle" class="text-xs text-slate-400 mt-2">開始時間: 45.00秒</p>
        </header>

        <!-- 4. デジタル数字とプログレスリング -->
        <main class="mb-8 flex flex-col items-center justify-center">
            <div class="relative w-64 h-64 flex items-center justify-center">
                <svg class="w-full h-full transform -rotate-90">
                    <circle cx="128" cy="128" r="110" stroke="currentColor" stroke-width="12" class="text-slate-700" fill="transparent" />
                    <circle 
                        id="progress-ring"
                        cx="128" cy="128" r="110" 
                        stroke="currentColor" stroke-width="12" 
                        class="text-teal-400 transition-all duration-100 ease-linear" 
                        stroke-dasharray="691.15"
                        stroke-dashoffset="0"
                        stroke-linecap="round"
                        fill="transparent" 
                    />
                </svg>
                <div class="absolute flex flex-col items-center justify-center">
                    <span id="timer-display" class="text-6xl font-mono font-bold tracking-tighter text-slate-50">45.00</span>
                    <span class="text-xs tracking-widest text-slate-400 uppercase mt-1">Seconds</span>
                </div>
            </div>
        </main>

        <!-- 5. コントロールボタン -->
        <footer class="flex flex-col gap-4">
            <div class="flex justify-center gap-4">
                <button 
                    id="btn-primary" 
                    class="flex-1 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-900"
                >
                    <svg id="icon-play" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <svg id="icon-pause" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span id="btn-text">スタート</span>
                </button>

                <button id="btn-reset" class="py-4 px-6 rounded-2xl font-bold text-lg bg-slate-700 hover:bg-slate-600 text-slate-200 active:scale-95 transition-all duration-150">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"></path>
                    </svg>
                </button>
            </div>

            <!-- ステータスメッセージ -->
            <div id="status-message" class="text-sm text-slate-400 h-6">準備完了</div>

            <!-- 6. 計測結果のCSV出力ボタンエリア -->
            <div class="pt-4 border-t border-slate-700 flex flex-col gap-2">
                <div class="text-xs text-slate-400 flex justify-between items-center px-1">
                    <span>蓄積されたデータ: <strong id="record-count" class="text-teal-400">0</strong> 件</span>
                    <button id="btn-clear-records" class="text-slate-500 hover:text-rose-400 transition-colors">記録クリア</button>
                </div>
                <button 
                    id="btn-export" 
                    class="w-full py-2.5 px-4 rounded-xl font-bold text-sm bg-slate-700 hover:bg-slate-600 text-teal-400 border border-teal-500/30 active:scale-98 transition-all flex items-center justify-center gap-2"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    手動でCSVとしてダウンロード
                </button>
            </div>
        </footer>
    </div>

    <script>
        // --- 設定値の管理 ---
        let initialTime = 45.0; // 開始時間（秒）
        let activeTitle = "スタンドアロンタイマー"; // タイマー名
        const CIRCUMFERENCE = 2 * Math.PI * 110; // プログレスリングの円周

        // --- 状態管理変数 ---
        let timeLeft = initialTime;
        let timerInterval = null;
        let isRunning = false;
        let lastTimestamp = 0;

        // 計測結果を蓄積する配列（ブラウザ一時保存用）
        let resultsStorage = []; 

        // --- DOM要素の取得 ---
        const pageTitle = document.getElementById('page-title');
        const timerTitle = document.getElementById('timer-title');
        const timerSubtitle = document.getElementById('timer-subtitle');
        const timerDisplay = document.getElementById('timer-display');
        const progressRing = document.getElementById('progress-ring');
        const btnPrimary = document.getElementById('btn-primary');
        const btnReset = document.getElementById('btn-reset');
        const btnText = document.getElementById('btn-text');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const statusMessage = document.getElementById('status-message');
        const csvFileInput = document.getElementById('csv-file-input');
        const csvUrlInput = document.getElementById('csv-url-input');
        const btnLoadUrl = document.getElementById('btn-load-url');
        const gasUrlInput = document.getElementById('gas-url-input');
        const connectionStatus = document.getElementById('connection-status');
        
        // 蓄積データ表示・出力
        const btnExport = document.getElementById('btn-export');
        const btnClearRecords = document.getElementById('btn-clear-records');
        const recordCountDisplay = document.getElementById('record-count');

        // 音声合成（アラーム音）用コンテキスト
        let audioCtx = null;

        // --- アプリ初期化 ---
        function init() {
            // 前回の入力URLが残っていればローカルストレージから復元する（開発時の利便性向上）
            const savedGasUrl = localStorage.getItem('gas_url_setting');
            if (savedGasUrl) {
                gasUrlInput.value = savedGasUrl;
                updateConnectionStatus(true);
            }
            updateDisplay(initialTime);
            setupEventListeners();
        }

        // --- イベント設定 ---
        function setupEventListeners() {
            btnPrimary.addEventListener('click', toggleTimer);
            btnReset.addEventListener('click', resetTimer);
            csvFileInput.addEventListener('change', handleFileSelect);
            btnLoadUrl.addEventListener('click', handleUrlLoad);
            btnExport.addEventListener('click', exportToCSV);
            btnClearRecords.addEventListener('click', clearRecords);
            
            // GAS用URL入力時の動き
            gasUrlInput.addEventListener('input', () => {
                const url = gasUrlInput.value.trim();
                localStorage.setItem('gas_url_setting', url);
                updateConnectionStatus(url.length > 0);
            });
        }

        // 接続状態表示の更新
        function updateConnectionStatus(hasUrl) {
            if (hasUrl) {
                connectionStatus.textContent = "🟢 GAS設定あり";
                connectionStatus.className = "text-[10px] text-teal-400 font-bold";
            } else {
                connectionStatus.textContent = "⚪ 未設定 (ローカルのみ)";
                connectionStatus.className = "text-[10px] text-slate-500";
            }
        }

        // Web上のURL（Googleスプレッドシート公開リンクなど）から設定(CSV)を読み込む
        async function handleUrlLoad() {
            const url = csvUrlInput.value.trim();
            if (!url) {
                showStatus('URLを入力してください。', 'text-rose-400');
                return;
            }

            showStatus('読み込み中...', 'text-yellow-400');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                parseAndApplyCSV(csvText);
            } catch (err) {
                showStatus('読み込みに失敗しました。CORS制限またはURLを確認してください。', 'text-rose-400');
            }
        }

        // ローカルファイルの選択
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => parseAndApplyCSV(e.target.result);
                reader.readAsText(file, 'UTF-8');
            }
        }

        // CSVパース（共通）
        function parseAndApplyCSV(csvText) {
            try {
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                if (lines.length < 2) {
                    showStatus('CSVファイルの形式が正しくありません。', 'text-rose-400');
                    return;
                }

                const headers = lines[0].split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));
                const values = lines[1].split(',').map(c => c.trim().replace(/^["']|["']$/g, ''));

                const timeIndex = headers.indexOf('開始時間');
                const titleIndex = headers.indexOf('タイトル');

                if (timeIndex === -1 || titleIndex === -1) {
                    showStatus('ヘッダーに「開始時間」「タイトル」が必要です。', 'text-rose-400');
                    return;
                }

                const parsedTime = parseFloat(values[timeIndex]);
                const parsedTitle = values[titleIndex];

                if (isNaN(parsedTime) || parsedTime <= 0 || !parsedTitle) {
                    showStatus('不正なデータが含まれています。', 'text-rose-400');
                    return;
                }

                initialTime = parsedTime;
                timeLeft = initialTime;
                activeTitle = parsedTitle;

                timerTitle.textContent = parsedTitle;
                pageTitle.textContent = parsedTitle;
                timerSubtitle.textContent = `開始時間: ${initialTime.toFixed(2)}秒`;
                
                resetTimer();
                showStatus(`設定読み込み完了: ${parsedTitle}`, 'text-teal-400');
            } catch (err) {
                showStatus('パースエラーが発生しました。', 'text-rose-400');
            }
        }

        // 表示の更新（デジタル数字と進捗リング）
        function updateDisplay(time) {
            const displayTime = Math.max(0, time);
            timerDisplay.textContent = displayTime.toFixed(2);

            const progress = displayTime / initialTime;
            const offset = CIRCUMFERENCE - (progress * CIRCUMFERENCE);
            progressRing.style.strokeDashoffset = Math.max(0, Math.min(CIRCUMFERENCE, offset));

            if (displayTime <= 10 && displayTime > 0) {
                progressRing.className = "text-rose-500 transition-all duration-100 ease-linear";
                timerDisplay.className = "text-6xl font-mono font-bold tracking-tighter text-rose-400 pulse-warning";
            } else {
                progressRing.className = "text-teal-400 transition-all duration-100 ease-linear";
                timerDisplay.className = "text-6xl font-mono font-bold tracking-tighter text-slate-50";
            }
        }

        // タイマー動作切り替え
        function toggleTimer() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isRunning) {
                stopTimerAndRecord();
            } else {
                startTimer();
            }
        }

        // カウントダウン開始
        function startTimer() {
            if (timeLeft <= 0) timeLeft = initialTime;

            isRunning = true;
            lastTimestamp = performance.now();
            
            btnText.textContent = '停止（計測終了）';
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');
            btnPrimary.className = "flex-1 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 bg-gradient-to-r from-rose-500 to-rose-600 hover:from-rose-400 hover:to-rose-500 text-white";
            
            showStatus('計測中...', 'text-teal-400 font-medium');

            function tick(now) {
                if (!isRunning) return;
                const deltaTime = (now - lastTimestamp) / 1000;
                lastTimestamp = now;

                timeLeft -= deltaTime;

                if (timeLeft <= 0) {
                    timeLeft = 0;
                    updateDisplay(timeLeft);
                    completeTimer();
                } else {
                    updateDisplay(timeLeft);
                    timerInterval = requestAnimationFrame(tick);
                }
            }
            timerInterval = requestAnimationFrame(tick);
        }

        function stopTimerAndRecord() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            recordResult();

            btnText.textContent = 'スタート';
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            btnPrimary.className = "flex-1 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-900";
            
            showStatus('計測を終了しました。', 'text-yellow-400');
        }

        function completeTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);

            recordResult();

            btnText.textContent = 'スタート';
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            btnPrimary.className = "flex-1 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-900";
            
            showStatus('時間になりました！', 'text-rose-400 font-bold');
            playAlarmSound();
        }

        function resetTimer() {
            isRunning = false;
            cancelAnimationFrame(timerInterval);
            timeLeft = initialTime;
            updateDisplay(timeLeft);

            btnText.textContent = 'スタート';
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            btnPrimary.className = "flex-1 py-4 px-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all duration-150 flex items-center justify-center gap-2 bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-900";

            showStatus('準備完了');
        }

        // 計測結果の蓄積とGoogleスプレッドシート送信の並列処理
        function recordResult() {
            const now = new Date();
            const formattedDate = `${now.getFullYear()}/${(now.getMonth() + 1).toString().padStart(2, '0')}/${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            const newRecord = {
                date: formattedDate,
                title: activeTitle,
                initial: initialTime.toFixed(2),
                result: timeLeft.toFixed(2)
            };

            // 1. ローカル配列にプッシュ
            resultsStorage.push(newRecord);
            recordCountDisplay.textContent = resultsStorage.length;

            // 2. Google Apps Scriptへのデータ送信
            sendToGoogleSheet(newRecord);
        }

        // Fetch APIを使用したGASへのPOST送信
        async function sendToGoogleSheet(record) {
            const gasUrl = gasUrlInput.value.trim();
            if (!gasUrl) {
                showStatus('GASのURLが未設定のためローカルにのみ記録しました。', 'text-slate-400');
                return;
            }

            showStatus('スプレッドシートに送信中...', 'text-yellow-400');

            try {
                // 送信処理（mode: 'no-cors' により、ブラウザの同一生成元ポリシー制限を回避してGASにPOST）
                await fetch(gasUrl, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(record)
                });

                showStatus('スプレッドシートへ自動送信完了', 'text-teal-400');
                
            } catch (err) {
                console.error('GAS送信エラー:', err);
                showStatus('送信エラーが発生しました。接続先を確認してください。', 'text-rose-400');
            }
        }

        // 手動でのCSVエクスポート処理
        function exportToCSV() {
            if (resultsStorage.length === 0) {
                alert("出力する計測記録がありません。");
                return;
            }

            const headers = ['日時', 'タイトル', '設定(秒)', '結果(秒)'];
            const rows = resultsStorage.map(item => [
                item.date,
                item.title,
                item.initial,
                item.result
            ]);

            const allContent = [headers, ...rows];
            const csvString = "\uFEFF" + allContent.map(fields => 
                fields.map(val => `"${val.replace(/"/g, '""')}"`).join(",")
            ).join("\n");

            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `measurement_results.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showStatus('CSVファイルを出力しました！', 'text-teal-400');
        }

        // 記録クリア
        function clearRecords() {
            if (confirm("これまでの計測記録をすべてクリアしますか？")) {
                resultsStorage = [];
                recordCountDisplay.textContent = 0;
                showStatus('記録を消去しました。');
            }
        }

        // ビープ音
        function playAlarmSound() {
            if (!audioCtx) return;
            try {
                const playBeep = (delay, duration, frequency) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(frequency, audioCtx.currentTime + delay);
                    gain.gain.setValueAtTime(0, audioCtx.currentTime + delay);
                    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + delay + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime + delay);
                    osc.stop(audioCtx.currentTime + delay + duration);
                };
                playBeep(0, 0.2, 880);
                playBeep(0.3, 0.2, 880);
                playBeep(0.6, 0.5, 1200);
            } catch (e) {
                console.error(e);
            }
        }

        // ステータス表示の汎用関数
        function showStatus(message, textClass = 'text-slate-400') {
            statusMessage.textContent = message;
            statusMessage.className = `text-sm h-6 ${textClass}`;
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

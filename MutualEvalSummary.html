<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相互評価 リアルタイム集計ダッシュボード</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- PapaParse CDN (CSVパース用) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-16 font-sans">

  <!-- ヘッダーシステムバー (大画面投影用に文字サイズを調整) -->
  <div class="bg-white text-slate-800 p-5 sticky top-0 z-50 shadow-sm flex justify-between items-center text-sm md:text-base border-b border-slate-200">
    <div class="flex items-center space-x-2">
      <span id="status-dot" class="w-3.5 h-3.5 rounded-full bg-amber-500 animate-pulse"></span>
      <span class="font-extrabold text-base tracking-wider text-slate-700">Mutual Evaluation Dashboard 2026</span>
    </div>
    <div id="connection-indicator" class="bg-slate-100 border border-slate-200 px-4 py-1.5 rounded text-slate-600 font-mono text-xs md:text-sm">
      データロード待ち...
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 py-8 space-y-8">
    
    <!-- 大タイトル (プロジェクター投影に適した大文字サイズ) -->
    <header class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
          <span class="bg-indigo-100 text-indigo-800 text-xs md:text-sm font-black tracking-widest px-3 py-1.5 rounded-full uppercase">REPORT SYSTEM</span>
          <h1 id="app-title" class="text-3xl md:text-4xl font-black text-indigo-900 mt-2">相互評価 リアルタイム集計サマリー</h1>
          <p class="text-sm md:text-base text-slate-500 mt-2">集計結果から各観点の得点平均を算出し、高い順に並び替えて分かりやすく可視化します。</p>
        </div>
        <button type="button" onclick="loadDashboardData()" class="bg-indigo-600 hover:bg-indigo-750 text-white text-sm md:text-base font-bold px-6 py-4 rounded-xl shadow-md transition-all self-start md:self-auto">
          🔄 データを最新にする
        </button>
      </div>
    </header>

    <!-- ロード中ステータス表示 -->
    <div id="loader-notice" class="bg-indigo-50 border border-indigo-100 text-indigo-900 p-5 rounded-xl text-sm md:text-base font-medium">
      <span id="loader-notice-text">スプレッドシートパラメータを解析しています...</span>
    </div>

    <!-- 致命的エラー画面 -->
    <div id="error-screen" class="hidden bg-rose-50 border-2 border-rose-300 text-rose-950 p-6 rounded-2xl shadow-sm">
      <div class="flex items-center space-x-3 mb-3 text-rose-700">
        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
        <h3 class="font-bold text-lg md:text-xl">データの同期・取得に失敗しました</h3>
      </div>
      <p id="error-log-text" class="text-sm md:text-base leading-relaxed font-mono whitespace-pre-wrap text-rose-900 bg-rose-100/50 p-4 rounded-xl border border-rose-200"></p>
    </div>

    <!-- メインコンテンツ領域（ロード完了後に表示） -->
    <main id="dashboard-content" class="hidden space-y-8">

      <!-- 1. 総合評価マトリクス一覧表 (フォントサイズ拡大 & 高得点ソート & 金銀王冠) -->
      <section class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <h2 class="text-xl md:text-2xl font-black text-slate-800 mb-2 border-b border-slate-100 pb-2 flex items-center">
          📋 総合評価スコアマトリクス一覧表 (得点順)
        </h2>
        <p class="text-sm text-slate-500 mb-6">各チームの各観点平均値、および全観点の総合平均値をスコア順（高い順）にまとめた一覧表です。</p>
        <div class="overflow-x-auto rounded-xl border border-slate-200">
          <table class="w-full text-base md:text-lg text-left text-slate-600 border-collapse">
            <thead class="text-xs md:text-sm text-slate-700 uppercase bg-slate-50 border-b border-slate-200">
              <tr id="matrix-header">
                <!-- 動的ヘッダー -->
              </tr>
            </thead>
            <tbody id="matrix-body" class="divide-y divide-slate-100">
              <!-- 動的データ行 -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- 2. 定量スコア平均チャートセクション (評価観点別比較に一本化 & 文字サイズ拡大) -->
      <section class="bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
        <div class="border-b border-slate-100 pb-3 mb-6">
          <h2 class="text-xl md:text-2xl font-black text-slate-800">
            ⚖️ 評価観点（項目）別 チーム間比較
          </h2>
          <p class="text-sm text-slate-500 mt-1">「観点」から始まる評価項目ごとに、全チームの平均得点を並列して比較します。</p>
        </div>

        <div id="summary-charts-container" class="space-y-8">
          <!-- スコア比較チャートが動的に挿入されます -->
        </div>
      </section>

    </main>
  </div>

  <script>
    const state = {
      resultSheetUrl: '',
      results: [],         // 読み込んだ評価結果行データ
      detectedTargets: [],   // CSVから自動抽出された「評価対象リスト」
      detectedGroups: [],    // CSVから自動抽出された「回答側グループリスト」
      
      // 自動判定されたカラムマッピング名
      keyMap: {
        timestamp: '',   // タイムスタンプ
        evaluator: '',   // 自分の名前
        group: '',       // 自分のグループ
        target: ''       // 評価対象
      },
      pointColumns: [],    // 自動判定された「数値評価カラム」
      textColumns: []      // 自動判定された「コメントカラム」
    };

    // 観点選択値の最初の数値(1〜4)のみを抽出・加工するヘルパー関数
    function extractScore(val) {
      if (val === undefined || val === null) return '';
      const match = val.toString().trim().match(/^\d+/);
      return match ? match[0] : val.toString().trim();
    }

    // GoogleスプレッドシートからCSVを取得
    async function fetchCsv(url) {
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTPエラー [ステータス: ${response.status}]`);
      const text = await response.text();
      
      const clean = text.trim();
      if (clean.startsWith('<!DOCTYPE') || clean.startsWith('<html') || clean.startsWith('<xml')) {
        throw new Error("指定されたURLからCSVデータを正常にフェッチできませんでした。スプレッドシートが「Webに公開（カンマ区切り値.csv）」で公開されているかご確認ください。");
      }
      return text;
    }

    // スプレッドシートURLを公開CSVの形に動的変換
    function cleanSheetUrl(url) {
      if (!url) return '';
      let target = url.trim();
      if (target.includes('/edit')) {
        return target.split('/edit')[0] + '/export?format=csv';
      } else if (target.includes('/pubhtml')) {
        return target.split('/pubhtml')[0] + '/pub?output=csv';
      }
      return target;
    }

    // 初期起動処理
    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      let resultParam = urlParams.get('result') || urlParams.get('config'); // config引数での代用もサポート

      // URLパラメータの ? 結合崩れパッチ
      const href = window.location.href;
      const resultMatch = href.match(/[?&](result|config)=([\s\S]+?)(?:&|$)/);
      if (resultMatch) {
        let extracted = resultMatch[2];
        const nextParamIdx = extracted.indexOf('&');
        if (nextParamIdx !== -1) {
          extracted = extracted.substring(0, nextParamIdx);
        }
        resultParam = decodeURIComponent(extracted);
      }

      if (!resultParam) {
        showFatalError("URLパラメータに `?result=【集計スプレッドシートのWeb公開CSV URL】` が指定されていません。\n\n[例]: MutualEvalSummary.html?result=https://docs.google.com/spreadsheets/d/e/.../pub?output=csv");
        return;
      }

      state.resultSheetUrl = cleanSheetUrl(resultParam);
      loadDashboardData();
    };

    function updateLoaderNotice(msg) {
      document.getElementById('loader-notice-text').textContent = msg;
    }

    function showFatalError(log) {
      document.getElementById('loader-notice').classList.add('hidden');
      const errScreen = document.getElementById('error-screen');
      errScreen.classList.remove('hidden');
      document.getElementById('error-log-text').textContent = log;
      document.getElementById('connection-indicator').textContent = "読み込みエラー";
      document.getElementById('connection-indicator').className = "bg-rose-100 border border-rose-200 px-3 py-1 rounded text-rose-700 font-mono text-xs";
      document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-rose-500";
    }

    // スプレッドシート（評価結果）から最新の回答レコードを取得して全自動解析
    async function loadDashboardData() {
      const loader = document.getElementById('loader-notice');
      loader.classList.remove('hidden');
      updateLoaderNotice('スプレッドシートから集計結果CSVをロードしています...');

      try {
        const resultsCsv = await fetchCsv(state.resultSheetUrl);
        
        // PapaParse でパース。ヘッダーのBOM・改行コード・空白を強力にトリミングクレンジングする
        const parsedResults = Papa.parse(resultsCsv, { 
          header: true, 
          skipEmptyLines: true,
          transformHeader: function(h) {
            return h.replace(/^\uFEFF/, '').replace(/[\r\n]+/g, '').trim();
          }
        });
        
        state.results = parsedResults.data;
        if (state.results.length === 0) {
          throw new Error("スプレッドシートから読み込まれた評価レコードが0件です。まだ誰も評価を送信していない可能性があります。");
        }

        // --- 全自動スキーマ判定 ---
        detectSchema(parsedResults.meta.fields.map(h => h.replace(/^\uFEFF/, '').replace(/[\r\n]+/g, '').trim()));

        // UIに状態反映
        document.getElementById('connection-indicator').textContent = "ONLINE 同期成功";
        document.getElementById('connection-indicator').className = "bg-green-100 border border-green-200 px-3 py-1 rounded text-green-700 font-mono text-xs";
        document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-green-500 animate-pulse";
        loader.classList.add('hidden');

        // ビジュアル描画
        renderDashboard();

      } catch (err) {
        showFatalError(`集計結果の自動解析に失敗しました。\n[ターゲットURL]: ${state.resultSheetUrl}\n\n【詳細内容】: ${err.message}`);
      }
    }

    // CSVヘッダー列から役割を自動判定する
    function detectSchema(fields) {
      state.pointColumns = [];
      state.textColumns = [];
      state.keyMap = { timestamp: '', evaluator: '', group: '', target: '' };

      fields.forEach(field => {
        const clean = field.trim();
        if (!clean) return;

        if (clean === "タイムスタンプ" || clean.toLowerCase() === "timestamp") {
          state.keyMap.timestamp = clean;
        }
        else if (clean.includes("名前") || clean.includes("回答者") || clean.toLowerCase() === "evaluatorname") {
          state.keyMap.evaluator = clean;
        }
        else if ((clean.includes("グループ") || clean.includes("班")) && !clean.includes("対象")) {
          state.keyMap.group = clean;
        }
        else if (clean.includes("対象") || clean.toLowerCase() === "targetname") {
          state.keyMap.target = clean;
        }
      });

      // フォールバック
      if (!state.keyMap.timestamp) state.keyMap.timestamp = fields[0] || 'タイムスタンプ';
      if (!state.keyMap.evaluator) state.keyMap.evaluator = fields.find(f => f.includes("名前")) || fields[1];
      if (!state.keyMap.group) state.keyMap.group = fields.find(f => f.includes("グループ") || f.includes("班")) || fields[2];
      if (!state.keyMap.target) state.keyMap.target = fields.find(f => f.includes("対象")) || fields[3];

      fields.forEach(field => {
        const clean = field.trim();
        if (!clean) return;

        if (clean === state.keyMap.timestamp || clean === state.keyMap.evaluator || clean === state.keyMap.group || clean === state.keyMap.target) {
          return;
        }

        // 観点スコア判定 (「観点」から始まるものに厳格に限定)
        if (clean.startsWith("観点")) {
          state.pointColumns.push(clean);
        } else {
          // それ以外の自由記述はすべてコメントと判定
          state.textColumns.push(clean);
        }
      });

      const rawTargets = state.results.map(row => row[state.keyMap.target]).filter(Boolean);
      state.detectedTargets = [...new Set(rawTargets)].sort();

      const rawGroups = state.results.map(row => row[state.keyMap.group]).filter(Boolean);
      state.detectedGroups = [...new Set(rawGroups)].sort();

      if (state.detectedGroups.length === 0) {
        state.detectedGroups = [...state.detectedTargets];
      }
    }

    // 各ターゲット（チーム）の得点を計算・集計し、全観点平均の降順（高い順）でソートされた配列を取得する
    function getSortedTargetsData() {
      const targetDataList = state.detectedTargets.map(targetName => {
        const targetRecords = state.results.filter(row => row[state.keyMap.target] === targetName);
        let allScores = [];
        const criteriaScores = {};

        state.pointColumns.forEach(columnName => {
          const scores = targetRecords.map(row => {
            const rawVal = row[columnName];
            const num = parseInt(extractScore(rawVal));
            return isNaN(num) ? null : num;
          }).filter(val => val !== null);

          const sum = scores.reduce((a, b) => a + b, 0);
          const avg = scores.length > 0 ? sum / scores.length : 0;
          criteriaScores[columnName] = {
            avg: avg,
            count: scores.length
          };

          allScores = allScores.concat(scores);
        });

        const allSum = allScores.reduce((a, b) => a + b, 0);
        const overallAvg = allScores.length > 0 ? allSum / allScores.length : 0;

        return {
          name: targetName,
          overallAvg: overallAvg,
          criteriaScores: criteriaScores,
          recordCount: targetRecords.length
        };
      });

      return targetDataList.sort((a, b) => b.overallAvg - a.overallAvg);
    }

    // ダッシュボード全体の可視化レンダリング
    function renderDashboard() {
      document.getElementById('dashboard-content').classList.remove('hidden');

      // マトリクス一覧表のレンダリング、チャート表示を処理
      renderDashboardMatrix();
      renderDashboardCharts();
    }

    // 総合評価マトリクス一覧表のレンダリング (高得点順ソート & 1位👑・2位🥈の王冠付与 & 文字サイズ拡大)
    function renderDashboardMatrix() {
      const headerRow = document.getElementById('matrix-header');
      const bodyRow = document.getElementById('matrix-body');
      
      headerRow.innerHTML = '';
      bodyRow.innerHTML = '';

      // 1. ヘッダーの生成
      let headerHtml = `
        <th scope="col" class="px-6 py-4.5 font-black text-slate-700 bg-slate-100 rounded-tl-xl border border-slate-200 text-sm md:text-base">評価対象（チーム）</th>
      `;
      state.pointColumns.forEach(columnName => {
        headerHtml += `
          <th scope="col" class="px-4 py-4.5 font-black text-slate-700 text-center border border-slate-200 max-w-[180px] truncate text-xs md:text-sm" title="${columnName}">
            ${columnName.split('：')[0] || columnName}
          </th>
        `;
      });
      // 全観点平均とサンプル数のヘッダーを追加
      headerHtml += `
        <th scope="col" class="px-4 py-4.5 font-black text-indigo-700 bg-indigo-50 text-center border border-slate-200 text-xs md:text-sm">全観点平均</th>
        <th scope="col" class="px-4 py-4.5 font-black text-slate-500 text-center border border-slate-200 rounded-tr-xl text-xs md:text-sm">評価数</th>
      `;
      headerRow.innerHTML = headerHtml;

      // 2. 高い順にソートされたターゲットデータを取得して描画
      const sortedTargets = getSortedTargetsData();

      sortedTargets.forEach((target, index) => {
        let crownBadge = '';
        if (index === 0) {
          crownBadge = '<span class="text-amber-500 mr-2 text-xl md:text-2xl" title="最高得点チーム">👑</span>';
        } else if (index === 1) {
          crownBadge = '<span class="text-slate-400 mr-2 text-xl md:text-2xl" title="準高得点チーム">🥈</span>';
        }

        let rowHtml = `
          <td class="px-6 py-5.5 font-bold text-slate-900 border border-slate-200 bg-white flex items-center text-base md:text-lg">
            ${crownBadge}${target.name}
          </td>
        `;

        // 各観点のスコア表示
        state.pointColumns.forEach(columnName => {
          const criteriaData = target.criteriaScores[columnName];
          const avgStr = criteriaData && criteriaData.count > 0 ? criteriaData.avg.toFixed(2) : '-';
          rowHtml += `
            <td class="px-4 py-5.5 text-center font-mono font-bold text-slate-700 border border-slate-200 bg-white text-base md:text-lg">${avgStr}</td>
          `;
        });

        const overallAvgStr = target.overallAvg > 0 ? target.overallAvg.toFixed(2) : '-';

        rowHtml += `
          <td class="px-4 py-5.5 text-center font-mono font-black text-indigo-700 bg-indigo-50/50 border border-slate-200 text-base md:text-lg">${overallAvgStr}</td>
          <td class="px-4 py-5.5 text-center font-mono text-slate-400 border border-slate-200 bg-white text-sm md:text-base">${target.recordCount}</td>
        `;

        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50/80 transition-colors";
        tr.innerHTML = rowHtml;
        bodyRow.appendChild(tr);
      });
    }

    // グラフのレンダリング (「評価観点別」チーム間比較に一本化 & 文字サイズ拡大)
    function renderDashboardCharts() {
      const chartsCont = document.getElementById('summary-charts-container');
      chartsCont.innerHTML = '';

      const sortedTargets = getSortedTargetsData();

      // 各観点（項目）ごとに全チームのスコアを横並びで比較する
      state.pointColumns.forEach((columnName, colIdx) => {
        const card = document.createElement('div');
        card.className = "bg-white border border-slate-200 p-6 rounded-2xl space-y-5 shadow-sm transition-all duration-300";
        
        let cardHtml = `
          <div class="border-b border-slate-100 pb-2.5 mb-4">
            <h3 class="font-extrabold text-indigo-900 text-lg md:text-xl">${columnName}</h3>
          </div>
          <div class="space-y-4">
        `;

        // チームリストをこの特定の観点のスコア平均の降順でソート
        const sortedTeamsForCriteria = sortedTargets.map(t => {
          const criteriaData = t.criteriaScores[columnName];
          return {
            name: t.name,
            avg: criteriaData ? criteriaData.avg : 0,
            count: criteriaData ? criteriaData.count : 0
          };
        }).sort((a, b) => b.avg - a.avg);

        sortedTeamsForCriteria.forEach((teamData, index) => {
          const avgStr = teamData.count > 0 ? teamData.avg.toFixed(2) : '0.00';
          const percent = teamData.count > 0 ? (teamData.avg / 4) * 100 : 0;

          let crownIcon = '';
          if (index === 0) {
            crownIcon = '👑 ';
          } else if (index === 1) {
            crownIcon = '🥈 ';
          }

          cardHtml += `
            <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4">
              <div class="w-full sm:w-1/4 font-bold text-sm md:text-base text-slate-700 truncate" title="${teamData.name}">
                ${crownIcon}${teamData.name}
              </div>
              <div class="flex-1 bg-slate-100 h-7 rounded-lg overflow-hidden border border-slate-200 relative flex items-center shadow-inner">
                <div class="bg-indigo-600 h-full rounded-l-lg transition-all duration-500" style="width: ${percent}%"></div>
                <span class="absolute left-3 text-[11px] font-black tracking-wide ${percent > 12 ? 'text-white' : 'text-slate-750'}">
                  ${avgStr} 点
                </span>
              </div>
              <div class="text-xs font-mono text-slate-400 w-20 text-right sm:block hidden">
                ${teamData.count}件の回答
              </div>
            </div>
          `;
        });

        cardHtml += `</div>`;
        card.innerHTML = cardHtml;
        chartsCont.appendChild(card);
      });

      // 【全観点総合平均】での比較カードを追加描画 (こちらもソート & 王冠表示)
      const totalCard = document.createElement('div');
      totalCard.className = "bg-white border-2 border-indigo-200 p-6 rounded-2xl space-y-5 shadow-sm transition-all duration-300 bg-indigo-50/10";
      
      let totalHtml = `
        <div class="border-b border-indigo-100 pb-2.5 mb-4 flex justify-between items-center">
          <h3 class="font-extrabold text-indigo-950 text-lg md:text-xl flex items-center gap-1.5">
            👑 全観点（総合平均スコア）比較
          </h3>
          <span class="text-[10px] font-black bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full">OVERALL COMPARISON</span>
        </div>
        <div class="space-y-4">
      `;

      sortedTargets.forEach((target, index) => {
        const overallAvgStr = target.overallAvg > 0 ? target.overallAvg.toFixed(2) : '0.00';
        const percent = target.overallAvg > 0 ? (target.overallAvg / 4) * 100 : 0;

        let crownIcon = '';
        if (index === 0) {
          crownIcon = '👑 ';
        } else if (index === 1) {
          crownIcon = '🥈 ';
        }

        totalHtml += `
          <div class="flex flex-col sm:flex-row sm:items-center gap-1 sm:gap-4">
            <div class="w-full sm:w-1/4 font-black text-sm md:text-base text-slate-800 truncate" title="${target.name}">
              ${crownIcon}${target.name}
            </div>
            <div class="flex-1 bg-slate-100 h-7 rounded-lg overflow-hidden border border-slate-200 relative flex items-center shadow-inner">
              <div class="bg-indigo-600 h-full rounded-l-lg transition-all duration-500" style="width: ${percent}%"></div>
              <span class="absolute left-3 text-[11px] font-black tracking-wide ${percent > 12 ? 'text-white' : 'text-slate-750'}">
                ${overallAvgStr} 点
              </span>
            </div>
            <div class="text-xs font-mono text-indigo-400 w-20 text-right sm:block hidden">
              ${target.recordCount}件の回答
            </div>
          </div>
        `;
      });

      totalHtml += `</div>`;
      totalCard.innerHTML = totalHtml;
      chartsCont.appendChild(totalCard);
    }
  </script>
</body>
</html>
